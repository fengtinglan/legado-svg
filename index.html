<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>颜色提取 · SVG气泡工具集</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            overflow-x: hidden;
        }
        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.07);
        }
        h1 {
            font-size: 1.8rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0;
            margin-bottom: 6px;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: normal;
            color: #64748b;
        }
        .input-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            background: #f1f5f9;
            border-radius: 14px;
            padding: 5px;
            width: fit-content;
            flex-wrap: wrap;
        }
        .input-tab {
            padding: 10px 22px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.25s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .input-tab.active {
            background: white;
            color: #0f172a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .input-tab:hover:not(.active) {
            color: #475569;
            background: rgba(255, 255, 255, 0.5);
        }
        textarea {
            width: 100%;
            height: 160px;
            padding: 14px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            background: #fafcff;
            transition: border-color 0.2s, opacity 0.25s;
            margin-top: 10px;
        }
        textarea:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        textarea.hidden {
            display: none;
        }
        textarea.drag-over {
            border-color: #3b82f6 !important;
            border-style: dashed !important;
            background: #eff6ff !important;
        }
        .upload-zone {
            width: 100%;
            min-height: 160px;
            border: 2px dashed #cbd5e1;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            background: #fafcff;
            transition: all 0.25s;
            padding: 30px 20px;
            margin-top: 10px;
            text-align: center;
            user-select: none;
            position: relative;
            overflow: hidden;
        }
        .upload-zone.hidden {
            display: none;
        }
        .upload-zone:hover {
            border-color: #3b82f6;
            background: #f8faff;
        }
        .upload-zone.drag-over {
            border-color: #3b82f6 !important;
            border-style: solid !important;
            background: #eff6ff !important;
            transform: scale(1.01);
        }
        .upload-zone .upload-icon {
            font-size: 3rem;
            pointer-events: none;
            transition: transform 0.3s;
        }
        .upload-zone.drag-over .upload-icon {
            transform: translateY(-6px);
        }
        .upload-zone .upload-label {
            font-weight: 600;
            color: #475569;
            font-size: 1rem;
        }
        .upload-zone .upload-hint {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .upload-zone .upload-loading {
            display: none;
            font-size: 0.9rem;
            color: #3b82f6;
            font-weight: 500;
        }
        .upload-zone.loading .upload-icon,
        .upload-zone.loading .upload-label,
        .upload-zone.loading .upload-hint {
            display: none;
        }
        .upload-zone.loading .upload-loading {
            display: block;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .upload-zone input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0 20px;
        }
        .actions-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .actions-row.extract-row {
            flex-direction: column;
            align-items: stretch;
        }
        .actions-row.extract-row .btn-group {
            width: 100%;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .actions-row .btn-group {
            display: flex;
            gap: 10px;
            flex: 0 0 auto;
            align-items: center;
        }
        .actions-row .btn-group button {
            width: 120px;
            flex-shrink: 0;
        }
        .btn-group.stacked {
            flex-direction: column;
            width: 100%;
            margin-left: 0;
            align-items: stretch;
        }
        .btn-group.stacked>button {
            width: 100% !important;
            flex: none;
        }
        .btn-group .sub-row,
        .btn-group .link-row {
            display: none;
        }
        .btn-group.stacked .sub-row {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .btn-group.stacked .sub-row button {
            flex: 1;
            min-width: 0;
            width: auto !important;
        }
        .btn-group.stacked .link-row {
            display: block;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            padding: 4px 0 0;
        }
        .link-status {
            font-size: 0.75rem;
            color: #94a3b8;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }
        .tool-toggle-btn .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
            font-size: 0.7rem;
            margin-left: 2px;
        }
        .tool-toggle-btn.open .arrow {
            transform: rotate(180deg);
        }
        .actions button {
            padding: 10px 0;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
            text-align: center;
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: scale(1.02);
        }
        .actions button.primary {
            background: #3b82f6;
            color: white;
        }
        .actions button.primary:hover {
            background: #2563eb;
        }
        .actions button.secondary {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button.secondary:hover {
            background: #cbd5e1;
        }
        #resultContainer {
            margin-top: 6px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            background: #f8fafc;
        }
        #statsAndTools {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px 20px;
            margin-bottom: 12px;
        }
        #statsAndTools.hidden {
            display: none;
        }
        .stats {
            font-size: 0.95rem;
            color: #475569;
        }
        .stats span {
            font-weight: 700;
            color: #0f172a;
        }
        .toolbar {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            flex: 1;
        }
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .toolbar-row:first-child button {
            flex: 1;
            min-width: 80px;
            max-width: 180px;
        }
        .toolbar-row:last-child {
            justify-content: center;
        }
        .toolbar-row:last-child button {
            min-width: 140px;
            flex: 1;
            max-width: 280px;
        }
        #selectedCount {
            font-size: 0.9rem;
            color: #475569;
            white-space: nowrap;
            margin-left: 4px;
        }
        .toolbar button {
            padding: 6px 16px;
            font-size: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            color: #1e293b;
            transition: background 0.1s;
            white-space: nowrap;
        }
        .toolbar button:hover {
            background: #f1f5f9;
        }
        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 16px;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 6px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
        }
        .color-item {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px 2px 2px;
            border-radius: 20px;
            gap: 6px;
            font-size: 0.9rem;
            user-select: none;
        }
        .color-item input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #3b82f6;
            cursor: pointer;
            margin: 0;
            flex-shrink: 0;
        }
        .color-swatch {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            flex-shrink: 0;
        }
        .color-label {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            word-break: break-all;
        }
        .empty-state {
            color: #94a3b8;
            font-style: italic;
            padding: 12px 0;
            text-align: center;
        }
        #replaceArea {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px dashed #d1d5db;
        }
        #replaceArea.hidden {
            display: none;
        }
        .replace-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
        }
        .replace-area label {
            font-weight: 500;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .replace-area input {
            padding: 8px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            width: 160px;
            background: white;
            transition: border-color 0.2s;
        }
        .replace-area input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .replace-area button {
            padding: 8px 26px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .replace-area button:hover {
            background: #1e293b;
        }
        .replace-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #replaceStatus {
            font-size: 0.85rem;
            color: #64748b;
        }
        #bubbleSection {
            margin-top: 24px;
            border-top: 2px solid #e2e8f0;
            padding-top: 16px;
        }
        #bubbleSection.hidden {
            display: none;
        }
        .bubble-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .bubble-header h2 {
            font-size: 1.2rem;
            color: #0f172a;
            margin: 0;
        }
        .bubble-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-start;
        }
        .preview-box {
            width: 200px;
            height: 200px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .preview-box svg {
            width: 100%;
            height: 100%;
        }
        .bubble-controls {
            flex: 1;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .control-row label {
            font-weight: 500;
            color: #475569;
            width: 70px;
            font-size: 0.9rem;
        }
        .control-row input {
            padding: 6px 12px;
            border: 1.5px solid #d1d5db;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            width: 100px;
            background: white;
            transition: border-color 0.2s;
        }
        .control-row input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .bubble-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .bubble-actions button {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .bubble-actions button:hover {
            transform: scale(1.02);
        }
        .btn-export {
            background: #0f172a;
            color: white;
        }
        .btn-export:hover {
            background: #1e293b;
        }
        .btn-apply {
            background: #3b82f6;
            color: white;
        }
        .btn-apply:hover {
            background: #2563eb;
        }
        .bubble-code-output {
            margin-top: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            display: none;
        }
        .bubble-code-output.show {
            display: block;
        }
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 360px;
            pointer-events: none;
        }
        .toast {
            background: #0f172a;
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.3s ease-out;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success {
            background: #16a34a;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast .toast-icon {
            font-size: 1.2rem;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .toast-out {
            animation: slideOut 0.25s ease-in forwards;
        }
        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 10000;
            transition: background 0.3s;
        }
        .modal-overlay.active {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.fullscreen {
            align-items: center;
        }
        .modal-overlay.fullscreen .modal-content {
            height: auto;
            max-height: 92vh;
            width: 1000px;
            max-width: 92vw;
            border-radius: 24px;
            transform: scale(0.95);
            transition: transform 0.3s;
        }
        .modal-overlay.fullscreen.active .modal-content {
            transform: scale(1);
        }
        .modal-overlay.drawer .modal-content {
            width: 100%;
            max-width: 100%;
            border-radius: 24px 24px 0 0;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), height 0.35s;
            will-change: transform, height;
            touch-action: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.15);
        }
        .modal-overlay.drawer.active .modal-content {
            transform: translateY(0);
        }
        .drawer-handle {
            width: 80px;
            height: 8px;
            border-radius: 99px;
            background: #94a3b8;
            margin: 16px auto 12px;
            flex-shrink: 0;
            cursor: grab;
            touch-action: none;
            user-select: none;
        }
        .modal-body {
            flex: 1;
            min-height: 0;
            position: relative;
            overflow: hidden;
            background: #f8fafc;
        }
        .modal-body iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
            z-index: 20;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @media (max-width: 740px) {
            .input-tabs {
                width: 100%;
                border-radius: 12px;
                padding: 4px;
            }
            .input-tab {
                flex: 1;
                justify-content: center;
                padding: 10px 12px;
                font-size: 0.85rem;
            }
            .bubble-preview-container {
                flex-direction: column;
                align-items: center;
            }
            .preview-box {
                width: 160px;
                height: 160px;
            }
            .actions-row .btn-group {
                width: 100%;
                margin-left: 0;
                justify-content: stretch;
            }
            .actions-row .btn-group button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div class="modal-overlay fullscreen" id="svgModal">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;">
                <h2 style="margin:0;">🔍 SVG 预览</h2>
                <button id="closeModalBtn" style="background:none;border:none;font-size:1.8rem;cursor:pointer;color:#94a3b8;">&times;</button>
            </div>
            <div class="modal-body" id="modalBody" style="min-height:400px;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;"></div>
        </div>
    </div>

    <div class="modal-overlay drawer" id="toSvgModal">
        <div class="modal-content" id="drawerContent">
            <div class="drawer-handle" id="drawerHandle"></div>
            <div class="modal-body" id="toSvgModalBody">
                <iframe src="" loading="lazy"></iframe>
                <div class="loading-overlay" id="toSvgLoading">
                    <div class="loading-spinner"></div>
                    <div>⏳ 正在加载工具...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🎨 颜色提取 · 气泡工具 <small>支持图片上传转气泡</small></h1>

        <div class="input-tabs" id="inputTabs">
            <button class="input-tab active" id="codeTabBtn" data-mode="code">✏️ 输入代码</button>
            <button class="input-tab" id="uploadTabBtn" data-mode="upload">📁 上传SVG文件</button>
            <button class="input-tab" id="imageTabBtn" data-mode="image">📷 上传图片</button>
        </div>

        <textarea id="codeInput" placeholder="在此粘贴你的代码（HTML/CSS/JS 或 SVG 代码）……"></textarea>

        <div id="uploadZone" class="upload-zone hidden">
            <span class="upload-icon">📤</span>
            <span class="upload-label">点击选择或拖拽 SVG 文件到此处</span>
            <span class="upload-hint">支持 .svg / .txt / .html / .xml 等文本文件</span>
            <span class="upload-loading">⏳ 正在读取文件…</span>
            <input type="file" id="fileInput" accept=".svg,.txt,.html,.htm,.xml,.css,.js,text/*,image/svg+xml">
        </div>

        <div id="imageUploadZone" class="upload-zone hidden">
            <span class="upload-icon">🖼️</span>
            <span class="upload-label">点击选择或拖拽图片到此处</span>
            <span class="upload-hint">支持 JPG、PNG、GIF、WebP 等常见格式</span>
            <span class="upload-loading">⏳ 正在处理图片…</span>
            <input type="file" id="imageFileInput" accept="image/*">
        </div>

        <div class="actions">
            <div class="actions-row extract-row">
                <button id="extractBtn" class="primary">🔍 提取所有颜色</button>
                <div class="btn-group">
                    <button id="clearBtn" class="secondary">🗑️ 清空</button>
                    <button id="copyCodeBtn" class="secondary">📄 复制代码</button>
                </div>
            </div>
            <div class="actions-row">
                <div style="display:flex; gap:10px; flex:1;">
                    <button id="openBubbleBtn" class="secondary" style="flex:1;">🎈 气泡预览</button>
                    <button id="convertReadingBtn" class="secondary" style="flex:1;">📐 转为阅读格式</button>
                </div>
                <div class="btn-group" id="toolGroup">
                    <button id="previewSvgBtn" class="secondary">🖼️ 预览 SVG</button>
                    <button id="toolToggleBtn" class="secondary tool-toggle-btn">
                        🔧 工具 <span class="arrow">▾</span>
                    </button>
                    <div class="sub-row" id="subRow">
                        <button id="toSvgBtn" class="secondary">🔄 图片转 SVG</button>
                        <button id="customLinkBtn" class="secondary">🔗 自定义链接</button>
                    </div>
                    <div class="link-row" id="linkRow">
                        <span class="link-status" id="linkStatus" title="当前图片转SVG链接">to-svg.com</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultContainer">
            <div id="statsAndTools" class="hidden">
                <div class="stats">共 <span id="colorCount">0</span> 个颜色（去重）</div>
                <div class="toolbar">
                    <div class="toolbar-row">
                        <button id="selectAllBtn">✅ 全选</button>
                        <button id="deselectAllBtn">⬜ 取消全选</button>
                    </div>
                    <div class="toolbar-row">
                        <button id="copyColorBtn">📋 复制颜色</button>
                        <span id="selectedCount">已选 0 个</span>
                    </div>
                </div>
            </div>
            <div id="resultDisplay"><div class="empty-state">等待提取…</div></div>
            <div id="replaceArea" class="hidden">
                <div class="replace-area">
                    <label>替换为：<input type="text" id="replaceInput" placeholder="#000000 或 空"></label>
                    <button id="replaceBtn">⚡ 替换选中的颜色</button>
                    <span id="replaceStatus"></span>
                </div>
            </div>
        </div>

        <div id="bubbleSection" class="hidden">
            <div class="bubble-header">
                <h2>🎈 气泡预览</h2>
                <button id="closeBubbleBtn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#94a3b8;">&times;</button>
            </div>
            <div class="bubble-preview-container">
                <div class="preview-box" id="bubblePreviewBox"></div>
                <div class="bubble-controls">
                    <div class="control-row"><label>X 坐标</label><input type="number" id="textX" value="550" step="1"></div>
                    <div class="control-row"><label>Y 坐标</label><input type="number" id="textY" value="630" step="1"></div>
                    <div class="control-row"><label>字体大小</label><input type="number" id="textSize" value="400" step="1" min="1"></div>
                    <div class="control-row"><label>字体颜色</label><input type="text" id="textFill" value="字" placeholder="字"></div>
                    <div class="control-row"><label>字体族</label><input type="text" id="textFont" value="Roboto Condensed" placeholder="字体名称"></div>
                    <div class="control-row"><label>描边粗细</label><input type="number" id="strokeWidth" value="6" step="0.5" min="0"></div>
                    <div class="control-row"><label>文本内容</label><input type="text" id="textContent" value="927" placeholder="预览文本"></div>
                    <div class="control-row">
                        <label>画布背景</label>
                        <input type="text" id="bgColor" value="transparent" placeholder="transparent / #ffffff" style="width:130px;">
                        <button id="applyBgColorBtn" class="btn-apply" style="padding:6px 14px; font-size:0.85rem;">应用</button>
                    </div>
                    <div class="bubble-actions">
                        <button id="applyBubbleBtn" class="btn-apply">⟳ 更新预览</button>
                        <button id="exportBubbleBtn" class="btn-export">📋 导出气泡格式</button>
                    </div>
                </div>
            </div>
            <div class="bubble-code-output" id="bubbleCodeOutput"></div>
        </div>
    </div>

    <script>
        (() => {
            const STORAGE_KEY = 'customSvgUrl';
            const DEFAULT_URL = 'https://to-svg.com/zh';
            const COLOR_REGEX = /#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})\b/g;
            const HALF_RATIO = 0.60,
                FULL_TRIGGER_RATIO = 0.85,
                CLOSE_RATIO = 0.30;

            let isFullscreen = false,
                windowHeight = window.innerHeight;
            let toolsOpen = false;
            let currentInputMode = 'code';

            const $ = id => document.getElementById(id);
            const input = $('codeInput'),
                resultDisplay = $('resultDisplay');
            const statsAndTools = $('statsAndTools'),
                colorCountSpan = $('colorCount');
            const selectedCountSpan = $('selectedCount'),
                replaceArea = $('replaceArea');
            const replaceInput = $('replaceInput'),
                replaceBtn = $('replaceBtn');
            const replaceStatus = $('replaceStatus');
            const toastContainer = document.querySelector('#toast-container');
            const uploadZone = $('uploadZone'),
                fileInput = $('fileInput');
            const imageUploadZone = $('imageUploadZone'),
                imageFileInput = $('imageFileInput');
            const codeTabBtn = $('codeTabBtn'),
                uploadTabBtn = $('uploadTabBtn'),
                imageTabBtn = $('imageTabBtn');
            const bubbleSection = $('bubbleSection'),
                bubblePreviewBox = $('bubblePreviewBox');
            const textX = $('textX'),
                textY = $('textY'),
                textSize = $('textSize');
            const textFill = $('textFill'),
                textContent = $('textContent'),
                textFont = $('textFont');
            const strokeWidth = $('strokeWidth');
            const bgColor = $('bgColor'),
                applyBgColorBtn = $('applyBgColorBtn');
            const applyBubbleBtn = $('applyBubbleBtn'),
                exportBubbleBtn = $('exportBubbleBtn');
            const bubbleCodeOutput = $('bubbleCodeOutput');
            const convertReadingBtn = $('convertReadingBtn');

            const TEXT_EXTENSIONS = new Set(['svg', 'txt', 'html', 'htm', 'xml', 'css', 'js', 'json', 'md', 'ts', 'jsx',
                'tsx', 'vue', 'svelte'
            ]);

            function getSvgUrl() { return localStorage.getItem(STORAGE_KEY) || DEFAULT_URL; }

            function setSvgUrl(url) { localStorage.setItem(STORAGE_KEY, url);
                updateLinkStatus(); }

            function updateLinkStatus() {
                const url = getSvgUrl();
                const linkEl = $('linkStatus');
                try { const p = new URL(url);
                    linkEl.textContent = p.hostname.replace(/^www\./, '');
                    linkEl.title = url; } catch { linkEl.textContent = url.substring(0, 28) + '…';
                    linkEl.title = url; }
            }

            function showToast(msg, type = 'success', dur = 3000) {
                const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span class="toast-icon">${icon}</span> ${msg}`;
                toastContainer.appendChild(toast);
                const timer = setTimeout(() => { toast.classList.add('toast-out');
                    setTimeout(() => toast.remove(), 300); }, dur);
                toast.addEventListener('click', () => { clearTimeout(timer);
                    toast.classList.add('toast-out');
                    setTimeout(() => toast.remove(), 300); });
            }

            function extractColors(text) {
                const matches = text.match(COLOR_REGEX);
                if (!matches) return [];
                const seen = new Set();
                return matches.filter(c => { const u = c.toUpperCase(); if (seen.has(u)) return false;
                    seen.add(u); return true; });
            }

            function renderColors(colors) {
                resultDisplay.innerHTML = '';
                if (!colors.length) {
                    resultDisplay.innerHTML = '<div class="empty-state">未找到任何颜色</div>';
                    statsAndTools.classList.add('hidden');
                    replaceArea.classList.add('hidden');
                    return;
                }
                statsAndTools.classList.remove('hidden');
                replaceArea.classList.remove('hidden');
                colorCountSpan.textContent = colors.length;
                const grid = document.createElement('div');
                grid.className = 'color-grid';
                colors.forEach(c => {
                    const bg = c.startsWith('#') ? c : `#${c}`;
                    const label = document.createElement('label');
                    label.className = 'color-item';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'color-checkbox';
                    cb.value = c;
                    cb.checked = true;
                    const swatch = document.createElement('span');
                    swatch.className = 'color-swatch';
                    swatch.style.background = bg;
                    const text = document.createElement('span');
                    text.className = 'color-label';
                    text.textContent = c;
                    label.append(cb, swatch, text);
                    grid.appendChild(label);
                });
                resultDisplay.appendChild(grid);
                updateSelectedCount();
                replaceStatus.textContent = '勾选颜色，输入替换内容，点击按钮';
                replaceStatus.style.color = '#64748b';
                grid.addEventListener('change', e => { if (e.target.classList.contains('color-checkbox')) { updateSelectedCount();
                        replaceStatus.textContent = ''; } });
            }

            function updateSelectedCount() {
                const checked = document.querySelectorAll('.color-checkbox:checked');
                selectedCountSpan.textContent = `已选 ${checked.length} 个`;
                replaceBtn.disabled = (checked.length === 0);
            }

            function getSelectedColors() {
                return Array.from(document.querySelectorAll('.color-checkbox:checked')).map(cb => cb.value);
            }

            function copyText(text, okMsg, failMsg = '复制失败') {
                if (!text.trim()) { showToast('⚠️ 没有内容可复制', 'error'); return false; }
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '-9999px';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                ta.setSelectionRange(0, text.length);
                let success = false;
                try { success = document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(ta);
                if (success) showToast(okMsg, 'success');
                else showToast(failMsg, 'error');
                return success;
            }

            function handleExtract() { renderColors(extractColors(input.value)); }

            function clearAll() { input.value = '';
                renderColors([]);
                replaceStatus.textContent = '';
                showToast('已清空', 'success'); }

            function copyCode() { if (!input.value.trim()) { showToast('输入框为空', 'error'); return; } copyText(input.value,
                    '✅ 代码已复制'); }

            function copyColors() {
                const colors = getSelectedColors().length ? getSelectedColors() : Array.from(document.querySelectorAll(
                    '.color-checkbox')).map(cb => cb.value);
                if (!colors.length) { showToast('没有颜色可复制', 'error'); return; }
                copyText(colors.join('\n'), `✅ 已复制 ${colors.length} 个颜色`);
            }

            function performReplace() {
                const selected = getSelectedColors();
                if (!selected.length) { showToast('请至少勾选一个颜色', 'error'); return; }
                const replaceText = replaceInput.value;
                if (!confirm(`确定将选中的 ${selected.length} 个颜色替换为「${replaceText||'(空)'}」吗？`)) {
                    replaceStatus.textContent = '已取消';
                    replaceStatus.style.color = '#64748b';
                    return;
                }
                let newText = input.value;
                selected.forEach(c => { newText = newText.replace(new RegExp(c, 'gi'), replaceText); });
                input.value = newText;
                replaceStatus.textContent = `✅ 成功替换 ${selected.length} 个颜色！`;
                replaceStatus.style.color = '#16a34a';
                showToast(`✅ 成功替换 ${selected.length} 个颜色！`, 'success');
                handleExtract();
            }

            function previewSvg() {
                const code = input.value.trim();
                if (!code) { showToast('输入框为空', 'error'); return; }
                let svg = code;
                if (!/<svg\b/i.test(svg)) svg =
                    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">\n${svg}\n</svg>`;
                const html =
                    `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f8fafc;}svg{max-width:100%;max-height:100%;}</style></head><body>${svg}</body></html>`;
                const iframe = document.createElement('iframe');
                iframe.srcdoc = html;
                $('modalBody').innerHTML = '';
                $('modalBody').appendChild(iframe);
                $('svgModal').classList.add('active');
            }

            function closeModal() { $('svgModal').classList.remove('active');
                $('modalBody').innerHTML = '<div class="error-msg">已关闭</div>'; }

            function getHalfHeight() { return windowHeight * HALF_RATIO; }

            function getFullHeight() { return windowHeight; }

            function setUIMode(fullscreen, animate = true) {
                isFullscreen = fullscreen;
                const drawer = $('drawerContent');
                if (!animate) drawer.style.transition = 'none';
                if (fullscreen) { $('toSvgModal').classList.add('fullscreen-mode');
                    $('toSvgModalBody').style.overflow = 'auto'; } else { $('toSvgModal').classList.remove(
                        'fullscreen-mode');
                    $('toSvgModalBody').style.overflow = 'hidden'; }
                if (!animate) requestAnimationFrame(() => { drawer.style.transition = ''; });
            }

            function openToSvgModal() {
                const url = getSvgUrl();
                $('toSvgModalBody').querySelector('iframe').src = url;
                const half = getHalfHeight();
                $('drawerContent').style.height = half + 'px';
                setUIMode(false, false);
                $('toSvgModal').classList.add('active');
                $('toSvgLoading').classList.remove('hidden');
                $('toSvgModalBody').querySelector('iframe').onload = () => $('toSvgLoading').classList.add('hidden');
                setTimeout(() => $('toSvgLoading').classList.add('hidden'), 10000);
            }

            function closeToSvgModal() {
                $('toSvgModal').classList.remove('active');
                $('drawerContent').classList.remove('dragging');
                $('drawerContent').style.height = getHalfHeight() + 'px';
                setUIMode(false, false);
            }

            function customLink() {
                const current = getSvgUrl();
                const newUrl = prompt('请输入图片转 SVG 服务的完整链接：', current);
                if (newUrl === null) return;
                const trimmed = newUrl.trim();
                if (!trimmed) { showToast('链接不能为空', 'error'); return; }
                if (!/^https?:\/\//.test(trimmed)) { showToast('请输入有效链接', 'error'); return; }
                setSvgUrl(trimmed);
                showToast(`✅ 已切换至：${trimmed}`, 'success');
                if ($('toSvgModal').classList.contains('active')) {
                    const iframe = $('toSvgModalBody').querySelector('iframe');
                    iframe.src = trimmed;
                    $('toSvgLoading').classList.remove('hidden');
                    iframe.onload = () => $('toSvgLoading').classList.add('hidden');
                    setTimeout(() => $('toSvgLoading').classList.add('hidden'), 10000);
                }
            }

            function toggleTools() {
                toolsOpen = !toolsOpen;
                const toolGroup = $('toolGroup'),
                    toggleBtn = $('toolToggleBtn');
                if (toolsOpen) { toolGroup.classList.add('stacked');
                    toggleBtn.classList.add('open'); } else { toolGroup.classList.remove('stacked');
                    toggleBtn.classList.remove('open'); }
            }

            function setInputMode(mode) {
                currentInputMode = mode;
                input.classList.add('hidden');
                uploadZone.classList.add('hidden');
                imageUploadZone.classList.add('hidden');
                codeTabBtn.classList.remove('active');
                uploadTabBtn.classList.remove('active');
                imageTabBtn.classList.remove('active');

                if (mode === 'code') {
                    input.classList.remove('hidden');
                    codeTabBtn.classList.add('active');
                    input.focus();
                } else if (mode === 'upload') {
                    uploadZone.classList.remove('hidden');
                    uploadTabBtn.classList.add('active');
                } else if (mode === 'image') {
                    imageUploadZone.classList.remove('hidden');
                    imageTabBtn.classList.add('active');
                }
            }

            codeTabBtn.addEventListener('click', () => setInputMode('code'));
            uploadTabBtn.addEventListener('click', () => setInputMode('upload'));
            imageTabBtn.addEventListener('click', () => setInputMode('image'));

            function getFileExtension(filename) {
                const lastDot = filename.lastIndexOf('.'); return lastDot === -1 ? '' : filename.substring(lastDot + 1)
                    .toLowerCase();
            }

            function isTextFile(filename) { const ext = getFileExtension(filename); return !ext || TEXT_EXTENSIONS.has(ext); }

            function isImageFile(filename) {
                const ext = getFileExtension(filename);
                return new Set(['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'ico', 'tiff', 'heic']).has(ext);
            }

            function readFileAndPopulate(file) {
                if (!file) return;
                const filename = file.name;
                if (isImageFile(filename)) {
                    if (confirm(`「${filename}」看起来是图片，是否跳转到图片转SVG工具？`)) {
                        fileInput.value = '';
                        openToSvgModal();
                        setInputMode('code');
                        return;
                    }
                }
                if (currentInputMode === 'upload') uploadZone.classList.add('loading');
                const reader = new FileReader();
                reader.onload = function(e) {
                    input.value = e.target.result;
                    setInputMode('code');
                    uploadZone.classList.remove('loading');
                    fileInput.value = '';
                    showToast(`✅ 已读取：${filename}`, 'success', 2500);
                    setTimeout(handleExtract, 150);
                };
                reader.onerror = function() {
                    uploadZone.classList.remove('loading');
                    fileInput.value = '';
                    showToast('❌ 文件读取失败', 'error');
                    setInputMode('code');
                };
                reader.readAsText(file);
            }

            fileInput.addEventListener('change', e => { if (e.target.files[0]) readFileAndPopulate(e.target.files[0]); });

            uploadZone.addEventListener('dragover', e => { e.preventDefault(); if (currentInputMode === 'upload') uploadZone
                    .classList.add('drag-over'); });
            uploadZone.addEventListener('dragleave', e => { e.preventDefault(); if (!uploadZone.contains(e.relatedTarget))
                    uploadZone.classList.remove('drag-over'); });
            uploadZone.addEventListener('drop', e => { e.preventDefault();
                uploadZone.classList.remove('drag-over'); if (currentInputMode === 'upload' && e.dataTransfer.files[0])
                    readFileAndPopulate(e.dataTransfer.files[0]); });

            function loadImageAsBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            function getImageDimensions(base64) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
                    img.onerror = reject;
                    img.src = base64;
                });
            }

            async function createImageBubble(base64) {
                try {
                    const dims = await getImageDimensions(base64);
                    const w = dims.width;
                    const h = dims.height;
                    const svgNS = 'http://www.w3.org/2000/svg';
                    const svg = document.createElementNS(svgNS, 'svg');
                    svg.setAttribute('xmlns', svgNS);
                    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
                    svg.setAttribute('width', w);
                    svg.setAttribute('height', h);
                    const image = document.createElementNS(svgNS, 'image');
                    image.setAttribute('x', '0');
                    image.setAttribute('y', '0');
                    image.setAttribute('width', w);
                    image.setAttribute('height', h);
                    image.setAttribute('href', base64);
                    svg.appendChild(image);
                    const text = document.createElementNS(svgNS, 'text');
                    text.setAttribute('x', w / 2);
                    text.setAttribute('y', h / 2 + 30);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('dominant-baseline', 'middle');
                    text.setAttribute('font-size', Math.max(16, Math.round(h / 10)));
                    text.setAttribute('font-family', 'Arial, sans-serif');
                    text.setAttribute('font-weight', 'bold');
                    text.setAttribute('fill', '#d500ff');
                    text.textContent = '数量';
                    svg.appendChild(text);
                    const serializer = new XMLSerializer();
                    return serializer.serializeToString(svg);
                } catch (err) {
                    showToast('图片处理失败: ' + err.message, 'error');
                    return null;
                }
            }

            async function handleImageFile(file) {
                if (!file) return;
                imageUploadZone.classList.add('loading');
                try {
                    const base64 = await loadImageAsBase64(file);
                    const svgCode = await createImageBubble(base64);
                    if (svgCode) {
                        input.value = svgCode;
                        setInputMode('code');
                        imageUploadZone.classList.remove('loading');
                        imageFileInput.value = '';
                        handleExtract();
                        openBubbleSection();
                        showToast('✅ 图片气泡已生成，可调整文本', 'success');
                    } else {
                        imageUploadZone.classList.remove('loading');
                    }
                } catch (err) {
                    imageUploadZone.classList.remove('loading');
                    imageFileInput.value = '';
                    showToast('图片处理失败: ' + err.message, 'error');
                }
            }

            imageFileInput.addEventListener('change', e => {
                if (e.target.files[0]) handleImageFile(e.target.files[0]);
            });

            imageUploadZone.addEventListener('dragover', e => { e.preventDefault(); if (currentInputMode === 'image')
                    imageUploadZone.classList.add('drag-over'); });
            imageUploadZone.addEventListener('dragleave', e => { e.preventDefault(); if (!imageUploadZone.contains(e
                    .relatedTarget)) imageUploadZone.classList.remove('drag-over'); });
            imageUploadZone.addEventListener('drop', e => {
                e.preventDefault();
                imageUploadZone.classList.remove('drag-over');
                if (currentInputMode === 'image' && e.dataTransfer.files[0]) handleImageFile(e.dataTransfer.files[
                0]);
            });

            function applyBackgroundColor() {
                const code = input.value.trim();
                if (!code || !/<svg\b/i.test(code)) { showToast('没有可用的 SVG 代码', 'error'); return; }
                const targetColor = bgColor.value.trim();
                if (!targetColor) { showToast('请输入背景颜色', 'error'); return; }
                const parser = new DOMParser();
                const doc = parser.parseFromString(code, 'image/svg+xml');
                if (doc.querySelector('parsererror')) { showToast('SVG 解析失败', 'error'); return; }
                const svg = doc.documentElement;
                let vb = svg.getAttribute('viewBox');
                let x = 0,
                    y = 0,
                    w = 1153,
                    h = 1024;
                if (vb) {
                    const parts = vb.trim().split(/\s+/);
                    if (parts.length === 4) { x = parseFloat(parts[0]);
                        y = parseFloat(parts[1]);
                        w = parseFloat(parts[2]);
                        h = parseFloat(parts[3]); }
                } else {
                    const wAttr = svg.getAttribute('width'),
                        hAttr = svg.getAttribute('height');
                    w = wAttr ? parseFloat(wAttr) : w;
                    h = hAttr ? parseFloat(hAttr) : h;
                }
                let bgEl = svg.querySelector('rect[data-bg="true"]');
                if (!bgEl) {
                    const paths = svg.querySelectorAll('path');
                    for (let p of paths) {
                        const d = p.getAttribute('d');
                        if (d && /^M\s*([\d.]+)\s+([\d.]+)\s*h\s*([\d.]+)\s*v\s*([\d.]+)\s*H\s*([\d.]+)\s*z$/i.test(d.trim())) {
                            const m = d.trim().match(
                                /^M\s*([\d.]+)\s+([\d.]+)\s*h\s*([\d.]+)\s*v\s*([\d.]+)\s*H\s*([\d.]+)\s*z$/i);
                            if (m && Math.abs(parseFloat(m[1]) - x) < 1 && Math.abs(parseFloat(m[2]) - y) < 1 && Math.abs(
                                    parseFloat(m[3]) - w) < 1 && Math.abs(parseFloat(m[4]) - h) < 1) { bgEl = p; break; }
                        }
                    }
                    if (!bgEl) {
                        bgEl = doc.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        bgEl.setAttribute('data-bg', 'true');
                        svg.insertBefore(bgEl, svg.firstChild);
                    }
                }
                bgEl.setAttribute('x', x);
                bgEl.setAttribute('y', y);
                bgEl.setAttribute('width', w);
                bgEl.setAttribute('height', h);
                bgEl.setAttribute('fill', targetColor);
                if (bgEl.tagName === 'path') bgEl.setAttribute('stroke', 'none');
                const serializer = new XMLSerializer();
                input.value = serializer.serializeToString(svg);
                handleExtract();
                updateBubblePreview();
                showToast(`✅ 画布背景已设置为 ${targetColor}`, 'success');
            }

            function updateBubblePreview() {
                const code = input.value.trim();
                if (!code || !/<svg\b/i.test(code)) { bubblePreviewBox.innerHTML =
                        '<span style="color:#94a3b8;">无有效SVG</span>'; return; }
                const parser = new DOMParser();
                const doc = parser.parseFromString(code, 'image/svg+xml');
                if (doc.querySelector('parsererror')) { bubblePreviewBox.innerHTML =
                        '<span style="color:#dc2626;">SVG解析错误</span>'; return; }
                const previewDoc = parser.parseFromString(code, 'image/svg+xml');
                const paths = previewDoc.querySelectorAll('path');
                paths.forEach(path => {
                    path.setAttribute('stroke-width', strokeWidth.value);
                    const currentStroke = path.getAttribute('stroke');
                    if (currentStroke && !/^(#|rgb|rgba|none|transparent|url)/i.test(currentStroke)) path.setAttribute(
                        'stroke', '#000000');
                });
                const textEl = previewDoc.querySelector('text');
                if (textEl) {
                    textEl.setAttribute('x', textX.value);
                    textEl.setAttribute('y', textY.value);
                    textEl.setAttribute('font-size', textSize.value);
                    textEl.setAttribute('font-family', textFont.value);
                    textEl.setAttribute('fill', '#000000');
                    textEl.textContent = textContent.value;
                }
                const serializer = new XMLSerializer();
                const previewSvg = serializer.serializeToString(previewDoc.documentElement);
                bubblePreviewBox.innerHTML = previewSvg;
            }

            function openBubbleSection() {
                const code = input.value.trim();
                if (!code || !/<svg\b/i.test(code)) { showToast('请先输入或生成有效的 SVG 代码', 'error'); return; }
                const textInfo = (() => {
                    try {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(code, 'image/svg+xml');
                        const textEl = doc.querySelector('text');
                        if (textEl) return {
                            x: textEl.getAttribute('x') || '0',
                            y: textEl.getAttribute('y') || '0',
                            fontSize: textEl.getAttribute('font-size') || '16',
                            fill: textEl.getAttribute('fill') || '#000',
                            content: textEl.textContent || '',
                            fontFamily: textEl.getAttribute('font-family') || 'sans-serif'
                        };
                    } catch (e) {}
                    return null;
                })();
                if (textInfo) {
                    textX.value = textInfo.x;
                    textY.value = textInfo.y;
                    textSize.value = textInfo.fontSize;
                    textFill.value = textInfo.fill;
                    textContent.value = '927';
                    textFont.value = textInfo.fontFamily;
                } else {
                    textX.value = '550';
                    textY.value = '630';
                    textSize.value = '400';
                    textFill.value = '字';
                    textContent.value = '927';
                    textFont.value = 'Roboto Condensed';
                }
                strokeWidth.value = '6';
                bgColor.value = (() => {
                    try {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(code, 'image/svg+xml');
                        const svg = doc.documentElement;
                        const vb = svg.getAttribute('viewBox');
                        let x = 0,
                            y = 0,
                            w = 1153,
                            h = 1024;
                        if (vb) { const p = vb.trim().split(/\s+/); if (p.length === 4) { x = parseFloat(p[0]);
                                y = parseFloat(p[1]);
                                w = parseFloat(p[2]);
                                h = parseFloat(p[3]); } }
                        const rects = svg.querySelectorAll('rect');
                        for (let r of rects)
                            if (Math.abs(parseFloat(r.getAttribute('x') || 0) - x) < 1 && Math.abs(parseFloat(r.getAttribute(
                                    'y') || 0) - y) < 1 && Math.abs(parseFloat(r.getAttribute('width') || 0) - w) < 1 && Math
                                .abs(parseFloat(r.getAttribute('height') || 0) - h) < 1) return r.getAttribute('fill') ||
                                'transparent';
                        const paths = svg.querySelectorAll('path');
                        for (let p of paths) {
                            const d = p.getAttribute('d');
                            if (d && /^M\s*([\d.]+)\s+([\d.]+)\s*h\s*([\d.]+)\s*v\s*([\d.]+)\s*H\s*([\d.]+)\s*z$/i.test(d.trim())) {
                                const m = d.trim().match(
                                    /^M\s*([\d.]+)\s+([\d.]+)\s*h\s*([\d.]+)\s*v\s*([\d.]+)\s*H\s*([\d.]+)\s*z$/i);
                                if (m && Math.abs(parseFloat(m[1]) - x) < 1 && Math.abs(parseFloat(m[2]) - y) < 1 && Math.abs(
                                        parseFloat(m[3]) - w) < 1 && Math.abs(parseFloat(m[4]) - h) < 1) return p.getAttribute(
                                        'fill') || 'transparent';
                            }
                        }
                    } catch (e) {}
                    return 'transparent';
                })();
                bubbleSection.classList.remove('hidden');
                updateBubblePreview();
                showToast('✨ 气泡预览已打开，可调整参数', 'success');
            }

            function closeBubbleSection() { bubbleSection.classList.add('hidden');
                bubbleCodeOutput.classList.remove('show'); }

            function exportBubbleFormat() {
                const code = input.value.trim();
                if (!code || !/<svg\b/i.test(code)) { showToast('没有可导出的 SVG 代码', 'error'); return; }
                const parser = new DOMParser();
                const doc = parser.parseFromString(code, 'image/svg+xml');
                if (doc.querySelector('parsererror')) { showToast('SVG 解析失败', 'error'); return; }
                const textEl = doc.querySelector('text');
                if (textEl) {
                    textEl.setAttribute('x', textX.value);
                    textEl.setAttribute('y', textY.value);
                    textEl.setAttribute('font-size', textSize.value);
                    textEl.setAttribute('fill', textFill.value);
                    textEl.setAttribute('font-family', textFont.value);
                    textEl.textContent = '数量';
                }
                const serializer = new XMLSerializer();
                const exportSvg = serializer.serializeToString(doc.documentElement);
                bubbleCodeOutput.textContent = exportSvg;
                bubbleCodeOutput.classList.add('show');
                copyText(exportSvg, '✅ 气泡格式已复制到剪贴板');
            }

            function convertToReadingFormat() {
                const code = input.value.trim();
                if (!code || !/<svg\b/i.test(code)) { showToast('请先输入有效的 SVG 代码', 'error'); return; }
                const parser = new DOMParser();
                const doc = parser.parseFromString(code, 'image/svg+xml');
                if (doc.querySelector('parsererror')) { showToast('SVG 解析失败', 'error'); return; }
                const svg = doc.documentElement;
                let vb = svg.getAttribute('viewBox');
                let minX = 0,
                    minY = 0,
                    width = 1153,
                    height = 1024;
                if (vb) { const parts = vb.trim().split(/\s+/); if (parts.length === 4) { minX = parseFloat(parts[0]);
                        minY = parseFloat(parts[1]);
                        width = parseFloat(parts[2]);
                        height = parseFloat(parts[3]); } } else { const wAttr = svg.getAttribute('width'),
                        hAttr = svg.getAttribute('height');
                    width = wAttr ? parseFloat(wAttr) : width;
                    height = hAttr ? parseFloat(hAttr) : height; }
                const imageEl = svg.querySelector('image');
                if (imageEl) {
                    imageEl.setAttribute('x', minX);
                    imageEl.setAttribute('y', minY);
                    imageEl.setAttribute('width', width);
                    imageEl.setAttribute('height', height);
                }
                const cx = minX + width / 2;
                const cy = minY + height / 2;
                let textEl = svg.querySelector('text');
                if (!textEl) {
                    textEl = doc.createElementNS('http://www.w3.org/2000/svg', 'text');
                    svg.appendChild(textEl);
                }
                textEl.setAttribute('x', cx);
                textEl.setAttribute('y', cy);
                textEl.setAttribute('text-anchor', 'middle');
                textEl.setAttribute('dominant-baseline', 'middle');
                if (!textEl.getAttribute('font-size')) textEl.setAttribute('font-size', '42');
                textEl.setAttribute('fill', '字');
                textEl.textContent = '数量';
                const serializer = new XMLSerializer();
                input.value = serializer.serializeToString(svg);
                handleExtract();
                openBubbleSection();
                showToast('✅ 已转换为阅读格式，可微调后导出', 'success');
            }

            applyBgColorBtn.addEventListener('click', applyBackgroundColor);
            $('openBubbleBtn').addEventListener('click', openBubbleSection);
            convertReadingBtn.addEventListener('click', convertToReadingFormat);
            $('closeBubbleBtn').addEventListener('click', closeBubbleSection);
            applyBubbleBtn.addEventListener('click', updateBubblePreview);
            exportBubbleBtn.addEventListener('click', exportBubbleFormat);
            [textX, textY, textSize, textFill, textContent, textFont, strokeWidth].forEach(el => { el.addEventListener(
                    'input', updateBubblePreview); });

            $('extractBtn').addEventListener('click', handleExtract);
            $('clearBtn').addEventListener('click', clearAll);
            $('copyCodeBtn').addEventListener('click', copyCode);
            $('copyColorBtn').addEventListener('click', copyColors);
            $('previewSvgBtn').addEventListener('click', previewSvg);
            $('selectAllBtn').addEventListener('click', () => { document.querySelectorAll('.color-checkbox').forEach(cb => cb
                    .checked = true);
                updateSelectedCount(); });
            $('deselectAllBtn').addEventListener('click', () => { document.querySelectorAll('.color-checkbox').forEach(cb => cb
                    .checked = false);
                updateSelectedCount(); });
            $('replaceBtn').addEventListener('click', performReplace);
            $('toSvgBtn').addEventListener('click', openToSvgModal);
            $('customLinkBtn').addEventListener('click', customLink);
            $('toolToggleBtn').addEventListener('click', toggleTools);
            $('closeModalBtn').addEventListener('click', closeModal);
            $('svgModal').addEventListener('click', e => { if (e.target === $('svgModal')) closeModal(); });
            $('toSvgModal').addEventListener('click', e => { if (e.target === $('toSvgModal')) closeToSvgModal(); });

            let dragStartY, dragStartHeight, isDragging = false;

            function getClientY(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

            function onDragStart(e) {
                if (!$('toSvgModal').classList.contains('active')) return;
                if (e.target.closest('.upload-zone') || e.target.closest('textarea')) return;
                e.preventDefault();
                dragStartY = getClientY(e);
                dragStartHeight = parseFloat($('drawerContent').style.height) || getHalfHeight();
                isDragging = true;
                $('drawerContent').classList.add('dragging');
                $('drawerContent').style.transition = 'none';
                document.body.style.userSelect = 'none';
            }

            function onDragMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const delta = getClientY(e) - dragStartY;
                let newHeight = dragStartHeight - delta;
                newHeight = Math.min(getFullHeight(), Math.max(60, newHeight));
                $('drawerContent').style.height = newHeight + 'px';
                if (newHeight / windowHeight >= FULL_TRIGGER_RATIO && !isFullscreen) setUIMode(true, false);
                else if (newHeight / windowHeight < FULL_TRIGGER_RATIO && isFullscreen) setUIMode(false, false);
            }

            function onDragEnd() {
                if (!isDragging) return;
                isDragging = false;
                $('drawerContent').classList.remove('dragging');
                document.body.style.userSelect = '';
                $('drawerContent').style.transition = '';
                const finalHeight = parseFloat($('drawerContent').style.height) || getHalfHeight();
                const ratio = finalHeight / windowHeight;
                if (ratio < CLOSE_RATIO) { closeToSvgModal(); return; }
                if (ratio >= FULL_TRIGGER_RATIO) { $('drawerContent').style.height = getFullHeight() + 'px';
                    setUIMode(true, true); return; }
                $('drawerContent').style.height = getHalfHeight() + 'px';
                setUIMode(false, true);
            }

            const handle = $('drawerHandle');
            handle.addEventListener('touchstart', onDragStart, { passive: false });
            handle.addEventListener('mousedown', onDragStart);
            document.addEventListener('touchmove', onDragMove, { passive: false });
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('touchend', onDragEnd);
            document.addEventListener('mouseup', onDragEnd);
            handle.addEventListener('dragstart', e => e.preventDefault());

            window.addEventListener('resize', () => {
                windowHeight = window.innerHeight;
                if (!$('toSvgModal').classList.contains('active')) return;
                if (isFullscreen) $('drawerContent').style.height = getFullHeight() + 'px';
                else $('drawerContent').style.height = getHalfHeight() + 'px';
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    if ($('svgModal').classList.contains('active')) closeModal();
                    if ($('toSvgModal').classList.contains('active')) closeToSvgModal();
                    if (toolsOpen) toggleTools();
                    if (!bubbleSection.classList.contains('hidden')) closeBubbleSection();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && document.activeElement === input) { e.preventDefault();
                    handleExtract(); }
            });
            replaceInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault();
                    performReplace(); } });

            updateLinkStatus();
            input.value =
                `<svg viewBox="0 0 1153 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <path d="M1050.528497 512c10.611399-2.65285 21.222798-10.611399 26.528498-18.569948 5.305699-7.958549 7.958549-21.222798 5.305699-31.834197-5.305699-21.222798-29.181347-34.487047-50.404145-29.181347l-23.875647 5.305699c-2.65285-26.528497-7.958549-50.404145-18.569949-74.279792-21.222798-55.709845-58.362694-103.46114-108.766839-140.601037-5.305699-42.445596-10.611399-79.585492-18.569948-108.766839-15.917098-61.015544-39.792746-95.502591-71.626943-106.11399-21.222798-7.958549-45.098446-5.305699-68.974093 7.958549-15.917098 7.958549-31.834197 21.222798-47.751296 39.792747-18.569948 21.222798-39.792746 47.751295-63.668394 79.585492-50.404145-2.65285-100.80829 2.65285-148.559585 13.264248-53.056995 13.264249-103.46114 29.181347-151.212435 53.056995-31.834197-23.875648-63.668394-42.445596-87.544042-55.709844-21.222798-10.611399-39.792746-15.917098-58.362694-18.569948-26.528497-2.65285-47.751295 5.305699-63.668394 21.222797-29.181347 29.181347-37.139896 76.932642-26.528497 153.865285 5.305699 34.487047 13.264249 74.279793 26.528497 114.072539-15.917098 39.792746-23.875648 82.238342-23.875648 127.336788v10.611399h-29.181347c-13.264249 0-23.875648 5.305699-31.834197 13.264249-7.958549 7.958549-13.264249 18.569948-10.611399 29.181347 0 23.875648 21.222798 42.445596 45.098446 42.445596h42.445596l15.917098 39.792746-18.569948 5.305699c-13.264249 2.65285-23.875648 10.611399-29.181347 21.222798-5.305699 7.958549-5.305699 18.569948 0 29.181347 7.958549 15.917098 23.875648 23.875648 42.445596 23.875648 5.305699 0 7.958549 0 13.264249-2.65285l39.792746-10.611399c18.569948 21.222798 42.445596 39.792746 68.974093 58.362695 74.279793 45.098446 164.476684 68.974093 270.590674 68.974093 34.487047 0 68.974093-2.65285 106.113989-7.958549 145.906736-21.222798 267.937824-87.544041 342.217617-191.005182 7.958549-10.611399 15.917098-23.875648 23.875647-37.139896h2.65285l58.362694 2.65285h2.65285c13.264249 0 26.528497-5.305699 37.139897-13.264249 7.958549-7.958549 10.611399-18.569948 10.611399-29.181347 0-23.875648-23.875648-42.445596-50.404146-42.445596h-23.875647c2.65285-13.264249 5.305699-23.875648 7.958549-37.139897l37.139896-5.305699z m-896.663212 31.834197c0-37.139896 7.958549-74.279793 23.875648-108.766839l5.305699-13.264249-5.305699-15.917099c-13.264249-42.445596-23.875648-82.238342-26.528498-116.725388-7.958549-47.751295-2.65285-71.626943 2.65285-82.238342 7.958549 0 18.569948 5.305699 31.834197 10.611399 26.528497 13.264249 58.362694 31.834197 95.502591 61.015544l21.222797 15.917098 23.875648-13.264248c45.098446-26.528497 95.502591-45.098446 151.212435-58.362695 47.751295-10.611399 100.80829-15.917098 148.559586-10.611399l23.875648 2.65285 13.264248-21.222798c23.875648-37.139896 45.098446-66.321244 66.321244-87.544041 13.264249-15.917098 23.875648-21.222798 29.181347-23.875648h2.65285c0 2.65285 2.65285 5.305699 5.305699 7.958549 5.305699 10.611399 10.611399 23.875648 15.917099 42.445596 7.958549 29.181347 15.917098 68.974093 18.569948 114.072539l2.65285 18.569948 15.917098 10.611399c45.098446 29.181347 76.932642 68.974093 92.849741 114.072539 29.181347 74.279793 13.264249 164.476684-39.792746 238.756477-61.015544 84.891192-164.476684 140.601036-289.160622 159.170984-145.906736 21.222798-275.896373-7.958549-355.481865-74.279793-47.751295-45.098446-74.279793-103.46114-74.279793-169.782383z" stroke="边" fill="none"></path>
  <text x="550" y="630" font-family="Roboto Condensed" text-anchor="middle" dominant-baseline="middle" font-size="400" font-weight="bold" fill="字">数量</text>
</svg>`;
            setInputMode('code');
            setTimeout(handleExtract, 50);
        })();
    </script>
</body>
</html>

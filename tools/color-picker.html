<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>颜色选择器 - legado-svg</title>
    <link rel="icon" type="image/svg+xml" href="https://legado-svg.heartthrob.cn/images/legado-svg.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 24px; box-shadow: 0 12px 48px rgba(0,0,0,0.07); padding: 30px; max-width: 400px; width: 100%; }
        h2 { font-size: 1.4rem; color: #0f172a; display: flex; align-items: center; gap: 10px; margin: 0 0 24px; }
        h2 img { width: 1.3em; height: 1.3em; }

        /* 颜色选择器面板（样式与主工具一致） */
        .color-picker-panel { display: flex; flex-direction: column; gap: 16px; }
        .cp-sv-box { width: 100%; height: 220px; border-radius: 12px; position: relative; cursor: crosshair; touch-action: none; overflow: hidden; border: 1px solid #e2e8f0; }
        .cp-sv-box canvas { display: block; width: 100%; height: 100%; }
        .cp-sv-cursor { position: absolute; width: 18px; height: 18px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.3); pointer-events: none; transform: translate(-50%, -50%); }
        .cp-hue-bar { width: 100%; height: 28px; border-radius: 14px; background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); position: relative; cursor: pointer; touch-action: none; border: 1px solid #e2e8f0; }
        .cp-hue-thumb { position: absolute; top: -4px; width: 22px; height: 36px; background: white; border: 2px solid #0f172a; border-radius: 6px; pointer-events: none; transform: translateX(-50%); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .cp-current-color { display: flex; align-items: center; gap: 10px; }
        .cp-current-color input { flex: 1; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 1rem; background: #f8fafc; color: #0f172a; text-align: center; min-width: 0; }
        .cp-current-color input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .cp-copy-btn { padding: 10px 22px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; flex-shrink: 0; }
        .cp-copy-btn:hover { background: #1e293b; }
        .cp-copy-btn.copied { background: #16a34a; }
        .cp-presets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .cp-preset-swatch { width: 36px; height: 36px; border-radius: 12px; border: 2px solid #e2e8f0; cursor: pointer; transition: transform 0.1s, border-color 0.2s; }
        .cp-preset-swatch:hover { transform: scale(1.15); border-color: #0f172a; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .back-link:hover { color: #3b82f6; }

        @media (max-width: 480px) {
            .container { padding: 24px 20px; }
            .cp-sv-box { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>
            <img src="https://legado-svg.heartthrob.cn/images/legado-svg.svg" alt=""> 颜色选择器
        </h2>
        <div class="color-picker-panel">
            <div class="cp-sv-box">
                <canvas id="svCanvas"></canvas>
                <div class="cp-sv-cursor" id="svCursor"></div>
            </div>
            <div class="cp-hue-bar" id="hueBar">
                <div class="cp-hue-thumb" id="hueThumb"></div>
            </div>
            <div class="cp-current-color">
                <input type="text" id="hexInput" value="#ff0000" readonly>
                <button class="cp-copy-btn" id="copyBtn">复制</button>
            </div>
            <div class="cp-presets" id="presetsContainer">
                <!-- 预设颜色通过 JS 生成 -->
            </div>
        </div>
        <a href="https://legado-svg.heartthrob.cn" class="back-link">← 返回 legado-svg 工具</a>
    </div>

    <script>
        (() => {
            // 预设颜色列表
            const presetColors = [
                '#000000', '#ffffff', '#ef4444', '#3b82f6', '#10b981', '#f59e0b',
                '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#14b8a6',
                '#f43f5e', '#a855f7', '#0ea5e9', '#eab308'
            ];

            // 生成预设色块
            const presetsContainer = document.getElementById('presetsContainer');
            presetColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'cp-preset-swatch';
                swatch.style.backgroundColor = color;
                swatch.dataset.color = color;
                swatch.addEventListener('click', () => {
                    const hex = swatch.dataset.color;
                    document.getElementById('hexInput').value = hex;
                    setColorFromHex(hex);
                });
                presetsContainer.appendChild(swatch);
            });

            // 取色器逻辑（与主工具相同）
            const svCanvas = document.getElementById('svCanvas');
            const svCtx = svCanvas.getContext('2d');
            const svCursor = document.getElementById('svCursor');
            const hueBar = document.getElementById('hueBar');
            const hueThumb = document.getElementById('hueThumb');
            const hexInput = document.getElementById('hexInput');
            const copyBtn = document.getElementById('copyBtn');

            let hue = 0, sat = 1, val = 1;
            let draggingSv = false, draggingHue = false;

            function resizeCanvas() {
                const rect = svCanvas.parentElement.getBoundingClientRect();
                const w = rect.width || 280;
                svCanvas.width = w;
                svCanvas.height = 220;
                drawSv();
            }

            function drawSv() {
                const w = svCanvas.width, h = svCanvas.height;
                svCtx.clearRect(0, 0, w, h);
                // 基础色相
                svCtx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                svCtx.fillRect(0, 0, w, h);
                // 白渐变（从左到右，降低饱和度）
                const whiteGrad = svCtx.createLinearGradient(0, 0, w, 0);
                whiteGrad.addColorStop(0, 'white');
                whiteGrad.addColorStop(1, 'transparent');
                svCtx.fillStyle = whiteGrad;
                svCtx.fillRect(0, 0, w, h);
                // 黑渐变（从上到下，降低明度）
                const blackGrad = svCtx.createLinearGradient(0, 0, 0, h);
                blackGrad.addColorStop(0, 'transparent');
                blackGrad.addColorStop(1, 'black');
                svCtx.fillStyle = blackGrad;
                svCtx.fillRect(0, 0, w, h);
                updateSvCursor();
            }

            function updateSvCursor() {
                const w = svCanvas.width, h = svCanvas.height;
                const x = sat * w, y = (1 - val) * h;
                svCursor.style.left = x + 'px';
                svCursor.style.top = y + 'px';
            }

            function updateHueThumb() {
                const barWidth = hueBar.clientWidth;
                const x = (hue / 360) * barWidth;
                hueThumb.style.left = x + 'px';
            }

            function setHueFromPos(clientX) {
                const rect = hueBar.getBoundingClientRect();
                const barWidth = rect.width;
                let x = clientX - rect.left;
                x = Math.max(0, Math.min(barWidth, x));
                hue = (x / barWidth) * 360;
                drawSv();
                updateHueThumb();
                applyColor();
            }

            function setSvFromPos(clientX, clientY) {
                const rect = svCanvas.parentElement.getBoundingClientRect();
                const w = rect.width, h = rect.height;
                let x = clientX - rect.left, y = clientY - rect.top;
                x = Math.max(0, Math.min(w, x));
                y = Math.max(0, Math.min(h, y));
                sat = x / w;
                val = 1 - y / h;
                updateSvCursor();
                applyColor();
            }

            function hsvToRgb(h, s, v) {
                let r, g, b;
                const i = Math.floor(h / 60), f = h / 60 - i;
                const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
                switch (i % 6) {
                    case 0: r = v; g = t; b = p; break;
                    case 1: r = q; g = v; b = p; break;
                    case 2: r = p; g = v; b = t; break;
                    case 3: r = p; g = q; b = v; break;
                    case 4: r = t; g = p; b = v; break;
                    case 5: r = v; g = p; b = q; break;
                }
                return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
            }

            function getCurrentHex() {
                const [r, g, b] = hsvToRgb(hue, sat, val);
                return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            function applyColor() {
                hexInput.value = getCurrentHex();
            }

            function setColorFromHex(hex) {
                hex = hex.trim();
                if (/^#([0-9a-fA-F]{6})$/.test(hex)) {
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    // RGB 转 HSV
                    const rr = r / 255, gg = g / 255, bb = b / 255;
                    const max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb);
                    val = max;
                    const d = max - min;
                    sat = max === 0 ? 0 : d / max;
                    if (d !== 0) {
                        if (max === rr) {
                            hue = ((gg - bb) / d + (gg < bb ? 6 : 0)) * 60;
                        } else if (max === gg) {
                            hue = ((bb - rr) / d + 2) * 60;
                        } else {
                            hue = ((rr - gg) / d + 4) * 60;
                        }
                    } else {
                        hue = 0;
                    }
                } else {
                    hue = 0; sat = 1; val = 1;
                }
                drawSv();
                updateHueThumb();
                applyColor();
            }

            // 事件绑定
            svCanvas.parentElement.addEventListener('mousedown', e => { e.preventDefault(); draggingSv = true; setSvFromPos(e.clientX, e.clientY); });
            svCanvas.parentElement.addEventListener('touchstart', e => { e.preventDefault(); draggingSv = true; setSvFromPos(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            hueBar.addEventListener('mousedown', e => { e.preventDefault(); draggingHue = true; setHueFromPos(e.clientX); });
            hueBar.addEventListener('touchstart', e => { e.preventDefault(); draggingHue = true; setHueFromPos(e.touches[0].clientX); }, { passive: false });

            document.addEventListener('mousemove', e => { if (draggingSv) setSvFromPos(e.clientX, e.clientY); if (draggingHue) setHueFromPos(e.clientX); });
            document.addEventListener('touchmove', e => { if (draggingSv) setSvFromPos(e.touches[0].clientX, e.touches[0].clientY); if (draggingHue) setHueFromPos(e.touches[0].clientX); }, { passive: false });
            document.addEventListener('mouseup', () => { draggingSv = false; draggingHue = false; });
            document.addEventListener('touchend', () => { draggingSv = false; draggingHue = false; });

            copyBtn.addEventListener('click', () => {
                const hex = hexInput.value;
                navigator.clipboard.writeText(hex).then(() => {
                    copyBtn.textContent = '已复制!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = '复制';
                        copyBtn.classList.remove('copied');
                    }, 1500);
                }).catch(() => {
                    // 降级方案
                    const ta = document.createElement('textarea');
                    ta.value = hex;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    copyBtn.textContent = '已复制!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = '复制';
                        copyBtn.classList.remove('copied');
                    }, 1500);
                });
            });

            window.addEventListener('resize', resizeCanvas);

            // 初始化
            resizeCanvas();
            applyColor();
        })();
    </script>
</body>
</html>
            <button class="copy-btn" id="copyBtn">复制</button>
        </div>
        <div class="sliders">
            <div class="slider-row">
                <label>R</label>
                <input type="range" id="redSlider" min="0" max="255" value="249">
                <span class="value" id="redValue">249</span>
            </div>
            <div class="slider-row">
                <label>G</label>
                <input type="range" id="greenSlider" min="0" max="255" value="115">
                <span class="value" id="greenValue">115</span>
            </div>
            <div class="slider-row">
                <label>B</label>
                <input type="range" id="blueSlider" min="0" max="255" value="22">
                <span class="value" id="blueValue">22</span>
            </div>
        </div>
        <div class="presets">
            <div class="preset-swatch" style="background:#000000" data-color="#000000"></div>
            <div class="preset-swatch" style="background:#ffffff" data-color="#ffffff"></div>
            <div class="preset-swatch" style="background:#ef4444" data-color="#ef4444"></div>
            <div class="preset-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
            <div class="preset-swatch" style="background:#10b981" data-color="#10b981"></div>
            <div class="preset-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
            <div class="preset-swatch" style="background:#8b5cf6" data-color="#8b5cf6"></div>
            <div class="preset-swatch" style="background:#ec4899" data-color="#ec4899"></div>
            <div class="preset-swatch" style="background:#06b6d4" data-color="#06b6d4"></div>
            <div class="preset-swatch" style="background:#f97316" data-color="#f97316"></div>
        </div>
        <a href="../index.html" class="back-link">← 返回 legado-svg 工具</a>
    </div>
    <script>
        const redSlider = document.getElementById('redSlider');
        const greenSlider = document.getElementById('greenSlider');
        const blueSlider = document.getElementById('blueSlider');
        const redValue = document.getElementById('redValue');
        const greenValue = document.getElementById('greenValue');
        const blueValue = document.getElementById('blueValue');
        const hexInput = document.getElementById('hexInput');
        const colorDisplay = document.getElementById('colorDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const presets = document.querySelectorAll('.preset-swatch');

        function componentToHex(c) {
            const hex = c.toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }

        function rgbToHex(r, g, b) {
            return '#' + componentToHex(r) + componentToHex(g) + componentToHex(b);
        }

        function updateColor() {
            const r = parseInt(redSlider.value);
            const g = parseInt(greenSlider.value);
            const b = parseInt(blueSlider.value);
            redValue.textContent = r;
            greenValue.textContent = g;
            blueValue.textContent = b;
            const hex = rgbToHex(r, g, b);
            hexInput.value = hex;
            colorDisplay.style.backgroundColor = hex;
        }

        redSlider.addEventListener('input', updateColor);
        greenSlider.addEventListener('input', updateColor);
        blueSlider.addEventListener('input', updateColor);

        copyBtn.addEventListener('click', () => {
            const hex = hexInput.value;
            navigator.clipboard.writeText(hex).then(() => {
                copyBtn.textContent = '已复制!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                    copyBtn.classList.remove('copied');
                }, 1500);
            });
        });

        presets.forEach(swatch => {
            swatch.addEventListener('click', () => {
                const hex = swatch.dataset.color;
                hexInput.value = hex;
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                redSlider.value = r;
                greenSlider.value = g;
                blueSlider.value = b;
                redValue.textContent = r;
                greenValue.textContent = g;
                blueValue.textContent = b;
                colorDisplay.style.backgroundColor = hex;
            });
        });

        // 初始化
        updateColor();
    </script>
</body>
</html>

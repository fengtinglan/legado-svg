<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色选择器 - legado-svg</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 12px 48px rgba(0,0,0,0.07); max-width: 420px; width: 100%; }
        h2 { margin: 0 0 20px; font-size: 1.4rem; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .color-display { width: 100%; height: 80px; border-radius: 16px; border: 2px solid #e2e8f0; margin-bottom: 20px; transition: background 0.2s; }
        .color-value { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .color-value input { flex: 1; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 1rem; text-align: center; }
        .color-value input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .copy-btn { padding: 10px 20px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .copy-btn:hover { background: #1e293b; }
        .copy-btn.copied { background: #16a34a; }
        .sliders { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .slider-row label { width: 20px; font-weight: 600; color: #475569; }
        .slider-row input[type="range"] { flex: 1; accent-color: #3b82f6; }
        .slider-row .value { width: 40px; text-align: center; font-weight: 600; color: #0f172a; }
        .presets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .preset-swatch { width: 36px; height: 36px; border-radius: 12px; border: 2px solid #e2e8f0; cursor: pointer; transition: transform 0.1s, border-color 0.2s; }
        .preset-swatch:hover { transform: scale(1.15); border-color: #0f172a; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎨 颜色选择器</h2>
        <div class="color-display" id="colorDisplay" style="background-color: #f97316;"></div>
        <div class="color-value">
            <input type="text" id="hexInput" value="#f97316" readonly>
            <button class="copy-btn" id="copyBtn">复制</button>
        </div>
        <div class="sliders">
            <div class="slider-row">
                <label>R</label>
                <input type="range" id="redSlider" min="0" max="255" value="249">
                <span class="value" id="redValue">249</span>
            </div>
            <div class="slider-row">
                <label>G</label>
                <input type="range" id="greenSlider" min="0" max="255" value="115">
                <span class="value" id="greenValue">115</span>
            </div>
            <div class="slider-row">
                <label>B</label>
                <input type="range" id="blueSlider" min="0" max="255" value="22">
                <span class="value" id="blueValue">22</span>
            </div>
        </div>
        <div class="presets">
            <div class="preset-swatch" style="background:#000000" data-color="#000000"></div>
            <div class="preset-swatch" style="background:#ffffff" data-color="#ffffff"></div>
            <div class="preset-swatch" style="background:#ef4444" data-color="#ef4444"></div>
            <div class="preset-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
            <div class="preset-swatch" style="background:#10b981" data-color="#10b981"></div>
            <div class="preset-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
            <div class="preset-swatch" style="background:#8b5cf6" data-color="#8b5cf6"></div>
            <div class="preset-swatch" style="background:#ec4899" data-color="#ec4899"></div>
            <div class="preset-swatch" style="background:#06b6d4" data-color="#06b6d4"></div>
            <div class="preset-swatch" style="background:#f97316" data-color="#f97316"></div>
        </div>
        <a href="../index.html" class="back-link">← 返回 legado-svg 工具</a>
    </div>
    <script>
        const redSlider = document.getElementById('redSlider');
        const greenSlider = document.getElementById('greenSlider');
        const blueSlider = document.getElementById('blueSlider');
        const redValue = document.getElementById('redValue');
        const greenValue = document.getElementById('greenValue');
        const blueValue = document.getElementById('blueValue');
        const hexInput = document.getElementById('hexInput');
        const colorDisplay = document.getElementById('colorDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const presets = document.querySelectorAll('.preset-swatch');

        function componentToHex(c) {
            const hex = c.toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }

        function rgbToHex(r, g, b) {
            return '#' + componentToHex(r) + componentToHex(g) + componentToHex(b);
        }

        function updateColor() {
            const r = parseInt(redSlider.value);
            const g = parseInt(greenSlider.value);
            const b = parseInt(blueSlider.value);
            redValue.textContent = r;
            greenValue.textContent = g;
            blueValue.textContent = b;
            const hex = rgbToHex(r, g, b);
            hexInput.value = hex;
            colorDisplay.style.backgroundColor = hex;
        }

        redSlider.addEventListener('input', updateColor);
        greenSlider.addEventListener('input', updateColor);
        blueSlider.addEventListener('input', updateColor);

        copyBtn.addEventListener('click', () => {
            const hex = hexInput.value;
            navigator.clipboard.writeText(hex).then(() => {
                copyBtn.textContent = '已复制!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                    copyBtn.classList.remove('copied');
                }, 1500);
            });
        });

        presets.forEach(swatch => {
            swatch.addEventListener('click', () => {
                const hex = swatch.dataset.color;
                hexInput.value = hex;
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                redSlider.value = r;
                greenSlider.value = g;
                blueSlider.value = b;
                redValue.textContent = r;
                greenValue.textContent = g;
                blueValue.textContent = b;
                colorDisplay.style.backgroundColor = hex;
            });
        });

        // 初始化
        updateColor();
    </script>
</body>
</html>
